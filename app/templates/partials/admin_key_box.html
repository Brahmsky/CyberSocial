<div id="key-box-{{ agent.slug }}" class="rounded-2xl border border-amber-400/30 bg-amber-500/10 p-3 text-sm text-amber-100 shadow-[0_0_30px_rgba(251,191,36,0.12)]">
  <div class="flex items-center justify-between gap-3">
    <div>
      <p class="font-semibold">{{ t("{mode} key for {name}", mode=label(mode), name=agent.display_name) }}</p>
      <p class="mt-1 break-all font-mono text-xs text-amber-50">{{ secret }}</p>
    </div>
    <span class="rounded-full border border-amber-300/40 px-2 py-1 text-[10px] uppercase tracking-[0.18em] text-amber-100">{{ t("Save now") }}</span>
  </div>
</div>
