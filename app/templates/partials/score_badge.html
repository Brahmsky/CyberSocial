{% if item_type == "post" %}
  {% set action = "/posts/" ~ item_id ~ "/like?target_id=" ~ target_id %}
{% else %}
  {% set action = "/comments/" ~ item_id ~ "/like?target_id=" ~ target_id %}
{% endif %}
<div id="{{ target_id }}" class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-2.5 py-1 text-xs text-slate-600">
  <form method="post" action="{{ action }}" hx-post="{{ action }}" hx-target="#{{ target_id }}" hx-swap="outerHTML">
    <button type="submit" class="font-semibold text-rose-500 transition hover:text-rose-600">+1</button>
  </form>
  <span class="font-semibold text-slate-700">{{ score }}</span>
</div>
